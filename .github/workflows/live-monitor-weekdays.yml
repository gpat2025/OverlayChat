name: Live Match Automation Bot (Weekdays)

on:
  schedule:
    # 5:00 PM IST (11:30 UTC) - Weekdays
    - cron: '30 11 * * 1-5'

  # Allow manual triggering from the GitHub Actions UI just in case
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    # Allows the script to stay alive parsing updates for up to 7.5 hours (450 mins)
    timeout-minutes: 450 

    steps:
      - name: Checkout Repository Configuration
        uses: actions/checkout@v3

      - name: Setup Node.js Setup
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Cloud Dependencies
        run: npm i firebase-admin axios dotenv

      - name: Run Live Monitor Engine
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_ROOM: ipl
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        # Exits natively with code 0 once the match finishes
        run: node automation/monitor.js
