name: Live Match Automation Bot (Weekdays)

on:
  schedule:
    # 5:30 PM IST (12:00 UTC) - Weekdays
    - cron: '0 12 * * 1-5'

  # Allow manual triggering from the GitHub Actions UI just in case
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    # Allows the script to stay alive parsing updates for up to 5 hours (300 mins)
    timeout-minutes: 300 

    steps:
      - name: Checkout Repository Configuration
        uses: actions/checkout@v3

      - name: Setup Node.js Setup
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Cloud Dependencies
        run: npm i firebase-admin axios dotenv

      - name: Run Live Monitor Engine
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_ROOM: ipl
        # Exits natively with code 0 once the match finishes
        run: node automation/monitor.js
