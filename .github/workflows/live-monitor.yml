name: Live Match Automation Bot

on:
  schedule:
    # 1:30 PM IST (08:00 UTC) - Weekends
    - cron: '0 8 * * 0,6'
    
    # 5:30 PM IST (12:00 UTC) - Every day
    - cron: '0 12 * * *'

  # Allow manual triggering from the GitHub Actions UI just in case
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    # Allows the script to stay alive parsing updates for up to 5 hours (300 mins) to cover an entire T20 match safely
    timeout-minutes: 300 

    steps:
      - name: Checkout Repository Configuration
        uses: actions/checkout@v3

      - name: Setup Node.js Setup
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Cloud Dependencies
        run: npm i firebase-admin axios dotenv

      - name: Run Live Monitor Engine
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_ROOM: ipl
        # Exits natively with code 0 once the match finishes
        run: node automation/monitor.js
