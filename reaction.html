<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reaction Overlay</title>
    <style>
      html, body {
        background: transparent !important;
        margin: 0;
        padding: 0;
        overflow: hidden;
        width: 100vw;
        height: 100vh;
      }

      /* The entire overlay is the drag handle */
      #reactionOverlay {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        z-index: 9999;
        background: transparent;
        cursor: grab;
        -webkit-app-region: drag;
      }

      #reactionOverlay:active {
        cursor: grabbing;
      }

      #reactionGif {
        width: 100%;
        height: calc(100vh - 28px);
        object-fit: contain;
        display: block;
        background: transparent;
        pointer-events: none;
        -webkit-app-region: drag;
      }

      .reaction-from {
        height: 28px;
        line-height: 28px;
        padding: 0 10px;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
        font-size: 0.82rem;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.75);
        text-align: left;
        background: transparent;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        flex-shrink: 0;
        -webkit-app-region: drag;
      }

      .reaction-from strong {
        color: #fff;
        font-weight: 700;
      }

      .hidden {
        display: none !important;
      }

      /* Animations */
      .fade-in {
        animation: reactionFadeIn 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards;
      }

      .fade-out {
        animation: reactionFadeOut 0.5s cubic-bezier(0.23, 1, 0.32, 1) forwards;
      }

      @keyframes reactionFadeIn {
        0% { opacity: 0; transform: scale(0.9); filter: blur(10px); }
        100% { opacity: 1; transform: scale(1); filter: blur(0); }
      }

      @keyframes reactionFadeOut {
        0% { opacity: 1; transform: scale(1); filter: blur(0); }
        100% { opacity: 0; transform: scale(1.05); filter: blur(10px); }
      }
    </style>
  </head>
  <body class="overlay-shell">
    <div id="reactionOverlay" class="hidden">
      <img id="reactionGif" src="" alt="Reaction" />
      <span class="reaction-from">from <strong id="reactionSender">Anonymous</strong></span>
    </div>

    <script type="module" src="./assets/reaction.js"></script>
  </body>
</html>
